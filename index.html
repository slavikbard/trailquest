<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrailQuest 🏕️ — הרפתקת הטיול שלכם</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">

  <main class="landing">

    <header class="landing-header">
      <span class="landing-logo" role="img" aria-label="אוהל">🏕️</span>
      <h1 class="landing-title">TrailQuest</h1>
      <p class="landing-subtitle">הרפתקת הטיול שלכם</p>
    </header>

    <div class="landing-card">

      <div class="form-group">
        <label class="form-label" for="trailName">מה שם הטיול היום? 🗺️</label>
        <input
          type="text"
          id="trailName"
          class="form-input"
          placeholder="למשל: טיול יער האלה"
          maxlength="40"
          autocomplete="off"
        >
        <p class="error-msg" id="trailNameError">נא להזין שם לטיול 🙏</p>
      </div>

      <div class="form-group">
        <label class="form-label">בחרו קבוצת גיל:</label>
        <div class="age-buttons" role="group" aria-label="קבוצת גיל">
          <button class="age-btn" data-age="4-6"   onclick="selectAge(this)">גיל 4-6 🐣</button>
          <button class="age-btn" data-age="7-10"  onclick="selectAge(this)">גיל 7-10 🦊</button>
          <button class="age-btn" data-age="11-14" onclick="selectAge(this)">גיל 11-14 🦅</button>
        </div>
        <p class="error-msg" id="ageError">נא לבחור קבוצת גיל 🙏</p>
      </div>

      <div class="form-group">
        <label class="form-label">בחרו סוג המשחק:</label>
        <div class="mode-buttons" role="group" aria-label="סוג משחק">
          <button class="mode-btn active" data-mode="quiz"   onclick="selectMode(this)">🧠 חידון שאלות</button>
          <button class="mode-btn"        data-mode="quests" onclick="selectMode(this)">🏃 משימות הרפתקה</button>
        </div>
      </div>

      <button class="start-btn" onclick="startGame()">
        התחילו את הרפתקה! 🚀
      </button>

    </div>

    <footer class="landing-footer">
      <p>🌲 צאו, גלו, ותהנו! 🌲</p>
    </footer>

  </main>

  <script>
    function selectAge(btn) {
      document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('ageError').style.display = 'none';
    }

    function selectMode(btn) {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function startGame() {
      const input     = document.getElementById('trailName');
      const trail     = input.value.trim();
      const activeAge = document.querySelector('.age-btn.active');
      let ok = true;

      if (!trail) {
        document.getElementById('trailNameError').style.display = 'block';
        input.classList.add('input-error');
        input.focus();
        ok = false;
      } else {
        document.getElementById('trailNameError').style.display = 'none';
        input.classList.remove('input-error');
      }

      if (!activeAge) {
        document.getElementById('ageError').style.display = 'block';
        ok = false;
      }

      if (!ok) return;

      const activeMode = document.querySelector('.mode-btn.active');
      const mode = activeMode ? activeMode.dataset.mode : 'quiz';
      const params = new URLSearchParams({ trail, age: activeAge.dataset.age, mode });
      window.location.href = 'game.html?' + params.toString();
    }

    document.getElementById('trailName').addEventListener('keydown', e => {
      if (e.key === 'Enter') startGame();
    });

    document.getElementById('trailName').addEventListener('input', function () {
      document.getElementById('trailNameError').style.display = 'none';
      this.classList.remove('input-error');
    });
  </script>

</body>
</html>
