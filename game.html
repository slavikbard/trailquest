<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrailQuest 🏕️ — משימות!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="game-body">

  <!-- ── מסך טעינה ──────────────────────────── -->
  <div id="loadingScreen" class="loading-overlay">
    <div class="loading-box">
      <span class="loading-emoji">🏕️</span>
      <p class="loading-msg">מכינים משימות על</p>
      <p class="loading-trail" id="loadingTrail">...</p>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- ── Header ─────────────────────────────── -->
  <header class="game-header">
    <div class="game-trail-name" id="trailNameDisplay">🏕️</div>
    <div class="progress-bar-container" role="progressbar"
         aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressBar">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="game-score" id="score" aria-live="polite">⭐ 0</div>
  </header>

  <!-- ── מסך משימות ─────────────────────────── -->
  <main class="game-main" id="questView" style="display:none">

    <p class="quest-counter" id="questCounter">משימה 1 מתוך 10</p>

    <div class="quest-card" id="questCard">
      <div class="quest-card-header find" id="questCardHeader">
        <span class="quest-type-badge" id="questTypeBadge">🔍 חיפוש</span>
        <span class="quest-emoji" id="questEmoji" role="img">🌿</span>
      </div>
      <div class="quest-card-body">
        <h2 class="quest-title" id="questTitle">...</h2>
        <p class="quest-mission" id="questText">...</p>
        <button class="hint-btn" id="hintBtn">💡 רמז</button>
        <p class="hint-text" id="hintText"></p>
      </div>
    </div>

    <div class="game-actions">
      <button class="complete-btn" id="completeBtn">✅ סיימתי!</button>
      <button class="skip-btn" id="skipBtn">דלג ←</button>
    </div>

    <button class="home-link" id="homeLink">חזרה לעמוד הבית</button>

  </main>

  <!-- ── מסך סיום ────────────────────────────── -->
  <div class="completion-screen" id="completionScreen">
    <div class="completion-emoji" id="completionEmoji" role="img">🎉</div>
    <h1 class="completion-title">כל הכבוד!</h1>
    <div class="stars-container" id="stars" aria-label="דירוג">⭐</div>
    <div class="completion-score-wrap">
      <div class="completion-score" id="finalScore">0</div>
      <div class="completion-score-label">נקודות</div>
    </div>
    <p class="completion-subtitle" id="completionSubtitle"></p>
    <button class="home-btn" id="homeBtn">🏠 חזרה לעמוד הבית</button>
  </div>

  <script type="module">
    import { generateQuests } from './js/gemini.js';

    const params    = new URLSearchParams(window.location.search);
    const trailName = (params.get('trail') || 'הטיול שלנו').slice(0, 40);
    const ageGroup  = params.get('age') || '7-10';

    let quests         = [];
    let currentIndex   = 0;
    let score          = 0;
    let completedCount = 0;

    const TYPE_LABELS = {
      find:      { label: '🔍 חיפוש',  css: 'find'      },
      challenge: { label: '🏆 אתגר',   css: 'challenge' },
      observe:   { label: '👀 תצפית',  css: 'observe'   },
      riddle:    { label: '🧩 חידה',   css: 'riddle'    },
    };

    const FINISH_EMOJIS = ['🎉', '🏆', '🌟', '🦁', '🎊', '🥳'];

    /* ── Init ────────────────────────────────── */
    async function init() {
      document.getElementById('trailNameDisplay').textContent = '🏕️ ' + trailName;
      document.getElementById('loadingTrail').textContent     = trailName;

      const geminiQuests = await generateQuests(trailName, ageGroup);

      if (geminiQuests && geminiQuests.length >= 5) {
        quests = geminiQuests.slice(0, 10);
      } else {
        quests = await loadFallbackQuests();
      }

      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('questView').style.display     = 'flex';
      renderQuest();
    }

    /* ── Fallback: quests.json ───────────────── */
    async function loadFallbackQuests() {
      try {
        const res  = await fetch('./data/quests.json');
        if (!res.ok) throw new Error('fetch failed');
        const data = await res.json();
        const pool = data[ageGroup] || data['7-10'] || [];
        return shuffle([...pool]).slice(0, 10);
      } catch {
        return [];
      }
    }

    /* ── Shuffle ─────────────────────────────── */
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    /* ── Render quest ────────────────────────── */
    function renderQuest() {
      if (currentIndex >= quests.length) { showCompletion(); return; }

      const q     = quests[currentIndex];
      const total = quests.length;

      // Counter + progress bar
      document.getElementById('questCounter').textContent =
        'משימה ' + (currentIndex + 1) + ' מתוך ' + total;
      const pct = Math.round((currentIndex / total) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressBar').setAttribute('aria-valuenow', pct);

      // Type badge + header colour
      const typeInfo = TYPE_LABELS[q.type] || { label: '⭐ משימה', css: 'find' };
      document.getElementById('questCardHeader').className =
        'quest-card-header ' + typeInfo.css;
      document.getElementById('questTypeBadge').textContent = typeInfo.label;

      // Content
      document.getElementById('questEmoji').textContent = q.emoji   || '🌿';
      document.getElementById('questTitle').textContent  = q.title   || '';
      document.getElementById('questText').textContent   = q.mission || '';

      // Hint (reset hidden)
      const hintText = document.getElementById('hintText');
      hintText.textContent = q.hint || '';
      hintText.classList.remove('visible');
      document.getElementById('hintBtn').textContent = '💡 רמז';

      // Entrance animation
      const card = document.getElementById('questCard');
      card.classList.remove('card-enter');
      void card.offsetWidth;
      card.classList.add('card-enter');
    }

    /* ── Hint toggle ─────────────────────────── */
    function toggleHint() {
      const hintText = document.getElementById('hintText');
      const hintBtn  = document.getElementById('hintBtn');
      const showing  = hintText.classList.contains('visible');
      hintText.classList.toggle('visible', !showing);
      hintBtn.textContent = showing ? '💡 רמז' : '💡 הסתר רמז';
    }

    /* ── Complete quest ──────────────────────── */
    function completeQuest() {
      const points = quests[currentIndex].points || 10;
      score += points;
      completedCount++;

      const scoreEl = document.getElementById('score');
      scoreEl.textContent = '⭐ ' + score;
      scoreEl.classList.remove('score-bump');
      void scoreEl.offsetWidth;
      scoreEl.classList.add('score-bump');

      currentIndex++;
      setTimeout(renderQuest, 180);
    }

    /* ── Skip quest ──────────────────────────── */
    function skipQuest() {
      currentIndex++;
      renderQuest();
    }

    /* ── Completion screen ───────────────────── */
    function showCompletion() {
      document.getElementById('questView').style.display = 'none';
      document.getElementById('completionScreen').classList.add('active');

      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressBar').setAttribute('aria-valuenow', 100);

      const total = quests.length;
      const pct   = total > 0 ? (completedCount / total) * 100 : 0;

      document.getElementById('finalScore').textContent = score;
      document.getElementById('completionEmoji').textContent =
        FINISH_EMOJIS[Math.floor(Math.random() * FINISH_EMOJIS.length)];

      let stars = '⭐';
      if (pct >= 80) stars = '⭐⭐⭐';
      else if (pct >= 50) stars = '⭐⭐';
      document.getElementById('stars').textContent = stars;

      document.getElementById('completionSubtitle').textContent =
        'השלמת ' + completedCount + ' משימות מתוך ' + total + ' ב' + trailName + '! 🌟';
    }

    /* ── Event listeners ─────────────────────── */
    document.getElementById('hintBtn').addEventListener('click', toggleHint);
    document.getElementById('completeBtn').addEventListener('click', completeQuest);
    document.getElementById('skipBtn').addEventListener('click', skipQuest);
    document.getElementById('homeLink').addEventListener('click',
      () => { window.location.href = 'index.html'; });
    document.getElementById('homeBtn').addEventListener('click',
      () => { window.location.href = 'index.html'; });

    init();
  </script>

</body>
</html>
